<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <title>Vitas.desktop</title>
    <link rel="Stylesheet" href="./css/general.css">
    <link rel="Stylesheet" href="./css/taskbar.css">
    <link rel="Stylesheet" href="./css/panel.css">
    <link rel="Stylesheet" href="./css/main.css">
  </head>
  <body>
    <div class="pageContainer">
  <!-- Top Panel -->

      <header class="headerContainer noSelect">
        <div class="header">
          <button class="panelLeft">
            <img class="icon" src="./images/lightMode/volume.svg">
          </button>
            <div class="songMenu">
              <button class="musicBtn">
                <img class="musicIconSecondary" src="./images/lightMode/rewind.svg">
              </button>
              <button class="musicBtn">
                <img class="musicIcon" src="./images/lightMode/play.svg">
              </button>
              <button class="musicBtn">
                <img class="musicIconSecondary" src="./images/lightMode/forward.svg">
              </button>
            </div>
          <button class="panelRight">
            <img class="icon" src="./images/lightMode/brightness.svg">
          </button>
        </div>
      </header>

    <!-- Main block -->

      <main class="mainContainer">
        <div class="mainWindow noSelect">
          <div class="mainWindowDecoration">welcome</div>
          <div class="greetingContainer">
            <p class="welcomingText">hi! <span class="name">i'm Vitas</span></p>
            <p class="selfDescription">beginner developer, ...</p>
          </div>

        </div>
      </main>

    <!-- TaskBar -->
      <footer class="taskbarContainer">
        <div class="taskbar noSelect">

        </div>
      </footer>
    </div>
  </body>
</html>
