<!DOCTYPE html>
<html>
  <head>
    <title>Vitas.desktop</title>
    <link rel="Stylesheet" href="./css/general.css">
    <link rel="Stylesheet" href="./css/taskbar.css">
    <link rel="Stylesheet" href="./css/panel.css">
  </head>
  <body>
    <div class="pageContainer">
  <!-- Top Panel -->

      <header class="headerContainer">
        <div class="header">
          <button class="panelLeft">
            <img class="icon" src="./images/lightMode/volume.svg">
          </button>
          <div class="panelMiddle">
            <div class="songName">
              <p class="songText">song name</p>
            </div>
            <div class="songMenu">
              <button class="musicBtn">
                <img class="musicIcon" src="./images/lightMode/rewind.svg">
              </button>
              <button class="musicBtn">
                <img class="musicIcon" src="./images/lightMode/play.svg">
              </button>
              <button class="musicBtn">
                <img class="musicIcon" src="./images/lightMode/forward.svg">
              </button>
            </div>
          </div>
          <button class="panelRight">
            <img class="icon" src="./images/lightMode/brightness.svg">
          </button>
        </div>
      </header>

    <!-- Main block -->

      <main></main>

    <!-- TaskBar -->
      <footer class="taskbarContainer">
        <div class="taskbar">

        </div>
      </footer>
    </div>
  </body>
</html>
