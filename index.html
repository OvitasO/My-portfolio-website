<!DOCTYPE html>
<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <title>Vitas.desktop</title>
    <link rel="Stylesheet" href="./css/general.css">
    <link rel="Stylesheet" href="./css/taskbar.css">
    <link rel="Stylesheet" href="./css/panel.css">
    <link rel="Stylesheet" href="./css/main.css">
    <link rel="Stylesheet" href="./css/waves.css">
  </head>
  <body>
    <div class="pageContainer">
  <!-- Top Panel -->

      <header class="headerContainer noSelect">
        <div class="header">
          <button class="panelLeft">
            <img class="icon" src="./images/lightMode/volume.svg">
          </button>
            <div class="songMenu">
              <button class="musicBtn">
                <img class="musicIconSecondary" src="./images/lightMode/rewind.svg">
              </button>
              <button class="musicBtn">
                <img class="musicIcon" src="./images/lightMode/play.svg">
              </button>
              <button class="musicBtn">
                <img class="musicIconSecondary" src="./images/lightMode/forward.svg">
              </button>
            </div>
          <button class="panelRight">
            <img class="icon" src="./images/lightMode/brightness.svg">
          </button>
        </div>
      </header>

    <!-- Main block -->

      <main class="mainContainer">
        <div class="mainWindow noSelect">
          <div class="mainWindowDecoration">welcome</div>
          <div class="greetingContainer">
            <p class="welcomingText">hi! <span class="name">i'm Vitas</span></p>
            <p class="selfDescription">beginner developer, ...</p>
          </div>

        </div>
      </main>

    <!-- TaskBar -->
      <footer class="taskbarContainer">
        <div class="taskbar noSelect">

        </div>
      </footer>

    <!-- background wave -->

      <div class="waveBackground">
        <svg width="100%" height="100%" viewBox="0 0 1000 1000"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          preserveAspectRatio="none"
          overflow="auto"
          shape-rendering="auto">

          <defs>
            <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#a0d2ff" />
              <stop offset="15%" stop-color="#c7e4ff" />
              <stop offset="100%" stop-color="#c7e4ff" />
            </linearGradient>

            <path id="wavepath" d="M 0 2000 0 500 Q 150 492 300 500 t 300 0 300 0 300 0 300 0 300 0 v1000 z" />
            <path id="motionpath" d="M -600 0 0 0" />
          </defs>

          <g>
            <use xlink:href="#wavepath" y="-469" fill="url(#waveGradient)">
              <animateMotion dur="5s" repeatCount="indefinite">
                <mpath xlink:href="#motionpath" />
              </animateMotion>
            </use>
          </g>
        </svg>
      </div>

    </div>
  </body>
</html>
